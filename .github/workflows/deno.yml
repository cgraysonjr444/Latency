name: Deno CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

# Fixes the Node.js 20 Deprecation Warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Deno Environment
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x 

      - name: Verify Formatting
        run: deno fmt --check

      - name: Run Linter
        run: deno lint

      - name: Check Dependencies
        # Only runs if server.js exists in your repo
        run: deno info server.js

      - name: Run Tests
        # Runs any files ending in _test.ts or _test.js
        run: deno test -A
      # - name: Run Tests
      #   run: deno test -A --unstable
