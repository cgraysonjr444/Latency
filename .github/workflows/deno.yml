name: Deno CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

# SILENCE WARNINGS: Forces the runner to use Node 24 (2026 Standard)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Deno Environment
        uses: denoland/setup-deno@v2
        with:
          # Using 'v2.x' ensures you have the latest stable Deno 2 features
          deno-version: v2.x 
          # Speeds up your build by saving downloaded modules
          cache: true

      - name: Verify Formatting
        # 'continue-on-error' means a missing space won't break your build
        continue-on-error: true
        run: deno fmt --check

      - name: Run Linter
        run: deno lint

      - name: Check Dependencies
        # This verifies your 'monitor/systemLatency.js' has valid imports
        run: deno info monitor/systemLatency.js

      - name: Run Tests
        # This specifically runs your latency test file
        run: deno test -A monitor/monitor/systemLatency_test.js
