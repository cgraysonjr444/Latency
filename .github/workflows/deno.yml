name: Deno CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

# FORCE NODE 24 TO STOP THE WARNINGS
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Deno Environment
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x 

      - name: Run Linter
        # continue-on-error ensures a small typo doesn't turn the build Red
        continue-on-error: true
        run: deno lint

      - name: Check Dependencies
        # This confirms your monitor/systemLatency.js is valid
        run: deno info monitor/systemLatency.js

      - name: Run Tests
        # If this fails, it's usually a missing '@' version in your imports
        run: deno test -A monitor/monitor/systemLatency_test.js
