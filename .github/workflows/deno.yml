# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow will install Deno then run `deno lint` and `deno test`.
# For more information see: https://github.com/denoland/setup-deno

name: Deno CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# CRITICAL: Fixes the Node.js 20 Deprecation Warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Deno Environment
        # Uses the stable version and silences the runner warning
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x 

      - name: Verify Formatting
        # Deno has built-in formatting; this ensures your code is clean
        run: deno fmt --check

      - name: Run Linter
        # This checks for common coding errors in your server.js
        run: deno lint

      - name: Check Dependencies
        # Ensures all external URLs in your Deno code are reachable
        run: deno info server.js

      # - name: Run Tests
      #   run: deno test -A --unstable
