<script>
  // 1. CHANGE THIS TO YOUR ACTUAL RENDER URL
  const RENDER_URL = "https://latency-your-app-name.onrender.com";

  async function checkServerStatus() {
    const statusEl = document.getElementById('server-status'); // Adjust ID to match your HTML
    const dbStatusEl = document.getElementById('db-status');

    try {
      // We hit the /data endpoint we created earlier
      const response = await fetch(`${RENDER_URL}/data`);
      
      if (response.ok) {
        const data = await response.json();
        statusEl.innerText = "Result: Server Online ✅";
        dbStatusEl.innerText = `Database: Connected (${data.length} records found)`;
        console.log("Latest Spins:", data);
      } else {
        throw new Error("Server responded with error");
      }
    } catch (err) {
      statusEl.innerText = "Result: Server Offline ❌";
      dbStatusEl.innerText = "Database: Connection Error ❌";
      console.error("Connection failed:", err);
    }
  }

  // Run the check when the page loads
  window.onload = checkServerStatus;

  // Example: How to Log a Spin (if you add the POST route later)
  async function logSpin(spinData) {
    try {
      const response = await fetch(`${RENDER_URL}/spin`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(spinData)
      });
      return await response.json();
    } catch (err) {
      console.error("Log spin failed", err);
    }
  }
</script>
