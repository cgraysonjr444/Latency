<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Latency Pulse | cgraysonjr444</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        #chart-container { height: 400px; width: 90%; max-width: 800px; margin: 20px auto; background: #161b22; border-radius: 8px; padding: 10px; }
        .status { font-family: monospace; font-size: 14px; margin-bottom: 10px; }
        #loading { color: #f1e05a; }
    </style>
</head>
<body>
    <h1>Latency Pulse</h1>
    <div class="status">Server: <span id="server-status">Connecting...</span></div>
    <div id="chart-container"><canvas id="latencyChart"></canvas></div>

    <script>
        const API_URL = "https://latency-8zo5.onrender.com"; // YOUR LIVE URL
        const ctx = document.getElementById('latencyChart').getContext('2d');
        const statusEl = document.getElementById('server-status');

        const myChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Latency (ms)', data: [], borderColor: '#00ffcc', tension: 0.4 }] },
            options: { responsive: true, maintainAspectRatio: false }
        });

        async function sync() {
            try {
                // 1. Wake up/Check Server
                const check = await fetch(API_URL);
                if (check.ok) {
                    statusEl.innerText = "Online 🚀";
                    statusEl.style.color = "#00ffcc";
                }

                // 2. Fetch Stats
                const res = await fetch(`${API_URL}/stats`);
                const data = await res.json();
                
                if (data.length > 0) {
                    myChart.data.labels = data.map(d => new Date(d.created_at).toLocaleTimeString());
                    myChart.data.datasets[0].data = data.map(d => d.ping_ms);
                    myChart.update();
                }
            } catch (err) {
                statusEl.innerText = "Waking up server... (May take 1 min)";
                statusEl.style.color = "#f1e05a";
            }
        }

        setInterval(sync, 5000);
        sync();
    </script>
</body>
</html>
