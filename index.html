<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinyl Pulse | cgraysonjr444</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root { --bg: #0b0e14; --accent: #00ffcc; --card: #151921; --text: #c9d1d9; }
        
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', -apple-system, sans-serif; 
            text-align: center; padding: 20px; margin: 0; 
        }

        /* THE PULSE NODE ANIMATION */
        .pulse-node { 
            width: 12px; height: 12px; background: var(--accent); border-radius: 50%;
            display: inline-block; margin-right: 10px; position: relative;
        }
        .pulse-node::after {
            content: ''; position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; background: var(--accent); border-radius: 50%;
            animation: ring-pulse 1.5s infinite;
        }
        @keyframes ring-pulse { 
            0% { transform: scale(1); opacity: 0.6; } 
            100% { transform: scale(3); opacity: 0; } 
        }

        #chart-container { 
            height: 380px; width: 95%; max-width: 900px; 
            margin: 20px auto; background: var(--card); border-radius: 16px; 
            padding: 20px; border: 1px solid #30363d;
            box-shadow: 0 10px 50px rgba(0,0,0,0.6);
        }

        /* SEARCH INTERFACE */
        .search-container { margin-top: 40px; }
        .search-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        
        input { 
            padding: 14px; border-radius: 10px; border: 1px solid #30363d; 
            background: #000; color: white; width: 300px; outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: var(--accent); }
        
        button { 
            padding: 14px 28px; background: var(--accent); color: var(--bg); 
            border: none; border-radius: 10px; font-weight: bold; 
            cursor: pointer; transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); background: #00e6b8; }

        /* VINYL GRID */
        #results { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 25px; max-width: 1100px; margin: 0 auto; padding: 20px; 
        }
        .album { 
            background: var(--card); border-radius: 12px; overflow: hidden; 
            border: 1px solid #333; transition: 0.3s; 
        }
        .album:hover { transform: translateY(-8px); border-color: var(--accent); }
        .album img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .album p { font-size: 12px; padding: 10px; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #status-bar { font-family: monospace; font-size: 0.85rem; color: #8b949e; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <h1><span class="pulse-node"></span>Vinyl <span style="color:var(--accent)">Pulse</span></h1>
        <div id="status-bar">Syncing with Render Engine...</div>
    </header>

    <div id="chart-container">
        <canvas id="latencyChart"></canvas>
    </div>

    <div class="search-container">
        <div class="search-bar">
            <input type="text" id="albumQuery" placeholder="Search Artists or Albums..." onkeypress="if(event.key==='Enter') searchMusic()">
            <button onclick="searchMusic()">Search Discogs</button>
        </div>
        <div id="results"></div>
    </div>

    <script>
        const API_URL = "https://latency-8zo5.onrender.com";
        const ctx = document.getElementById('latencyChart').getContext('2d');
        const statusLog = document.getElementById('status-bar');

        // 1. CHART INITIALIZATION
        const myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Latency (ms)',
                    data: [],
                    borderColor: '#00ffcc',
                    backgroundColor: 'rgba(0, 255, 204, 0.08)',
                    borderWidth: 3,
                    tension: 0.4,
                    fill: true,
                    pointRadius: 3,
                    pointBackgroundColor: '#00ffcc'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, grid: { color: '#222' }, ticks: { color: '#888' } },
                    x: { grid: { display: false }, ticks: { color: '#888' } }
                },
                plugins: { legend: { display: false } }
            }
        });

        // 2. LIVE STATS SYNC
        async function updateStats() {
            try {
                const res = await fetch(`${API_URL}/stats`);
                
                // Only parse if the server actually sent JSON
                if (res.headers.get("content-type")?.includes("application/json")) {
                    const data = await res.json();
                    if (Array.isArray(data) && data.length > 0) {
                        myChart.data.labels = data.map(d => new Date(d.created_at).toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' }));
                        myChart.data.datasets[0].data = data.map(d => d.ping_ms);
                        myChart.update('none');
                        statusLog.innerText = `System Online | Last Ping: ${data[data.length-1].ping_ms}ms`;
                    }
                }
            } catch (err) {
                statusLog.innerText = "Reconnecting to Render Backend...";
            }
        }

        // 3. MUSIC SEARCH LOGIC
        async function searchMusic() {
            const query = document.getElementById('albumQuery').value;
            const resDiv = document.getElementById('results');
            if (!query) return;

            resDiv.innerHTML = "<p>Scanning the crates...</p>";

            try {
                const res = await fetch(`${API_URL}/search-album?q=${encodeURIComponent(query)}`);
                const data = await res.json();
                
                if (data.results && data.results.length > 0) {
                    resDiv.innerHTML = data.results.map(item => `
                        <div class="album">
                            <img src="${item.cover_image || 'https://via.placeholder.com/300'}" alt="vinyl-cover">
                            <p title="${item.title}">${item.title}</p>
                        </div>
                    `).join('');
                } else {
                    resDiv.innerHTML = "<p>No vinyl records found for that search.</p>";
                }
            } catch (err) {
                resDiv.innerHTML = `<p style="color:#ff4444">Connection Error: Check DISCOGS_TOKEN in Render.</p>`;
            }
        }

        // Run sync every 5 seconds
        setInterval(updateStats, 5000);
        updateStats(); // Run once immediately
    </script>
</body>
</html>
