<script>
  // 1. UPDATED WITH YOUR ACTUAL RENDER URL
  const RENDER_URL = "https://latency-8zo5.onrender.com";

  async function checkServerStatus() {
    // Look for the elements
    const statusEl = document.getElementById('server-status');
    const dbStatusEl = document.getElementById('db-status');

    // Safety Check: If these IDs don't exist in your HTML yet, the script will stop here instead of crashing the whole page
    if (!statusEl || !dbStatusEl) {
      console.error("Could not find server-status or db-status elements in the HTML.");
      return;
    }

    try {
      // Show "Loading..." while we wait
      statusEl.innerText = "Checking Server...";
      
      const response = await fetch(`${RENDER_URL}/data`);
      
      if (response.ok) {
        const data = await response.json();
        statusEl.innerText = "Result: Server Online ✅";
        // Check if data is an array (our Deno server returns an array)
        const count = Array.isArray(data) ? data.length : 0;
        dbStatusEl.innerText = `Database: Connected (${count} records found)`;
      } else {
        throw new Error("Server responded with error");
      }
    } catch (err) {
      statusEl.innerText = "Result: Server Offline ❌";
      dbStatusEl.innerText = "Database: Connection Error ❌";
      console.error("Connection failed:", err);
    }
  }

  // Use addEventListener instead of window.onload for better compatibility
  window.addEventListener('load', checkServerStatus);

  // Function to send data to the database
  async function logSpin(spinData) {
    try {
      const response = await fetch(`${RENDER_URL}/spin`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(spinData)
      });
      return await response.json();
    } catch (err) {
      console.error("Log spin failed", err);
    }
  }
</script>
