<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vinyl Pulse | cgraysonjr444</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root { --bg: #0b0e14; --accent: #00ffcc; --card: #151921; }
        body { background: var(--bg); color: #c9d1d9; font-family: sans-serif; text-align: center; padding: 20px; }
        
        /* THE PULSE EFFECT */
        .pulse { 
            width: 12px; height: 12px; background: var(--accent); border-radius: 50%;
            display: inline-block; margin-right: 8px; position: relative;
        }
        .pulse::after {
            content: ''; position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; background: var(--accent); border-radius: 50%;
            animation: ring 1.5s infinite;
        }
        @keyframes ring { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(3); opacity: 0; } }

        #chart-container { 
            height: 350px; width: 95%; max-width: 850px; 
            margin: 20px auto; background: var(--card); border-radius: 12px; padding: 15px;
            border: 1px solid #30363d;
        }

        .search-area { margin-top: 40px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: #000; color: white; width: 280px; }
        button { padding: 12px 24px; background: var(--accent); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        #results { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 25px; }
        .album { width: 160px; background: var(--card); border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        .album img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .album p { font-size: 11px; padding: 8px; margin: 0; height: 35px; overflow: hidden; }
    </style>
</head>
<body>

    <h1><span class="pulse"></span>Vinyl <span style="color:var(--accent)">Pulse</span></h1>
    <p id="status">Status: Connecting to Render...</p>

    <div id="chart-container"><canvas id="latencyChart"></canvas></div>

    <div class="search-area">
        <input type="text" id="query" placeholder="Artist or Album (e.g. JID)">
        <button onclick="searchMusic()">Search Vinyl</button>
        <div id="results"></div>
    </div>

    <script>
        const API_URL = "https://latency-8zo5.onrender.com";
        const ctx = document.getElementById('latencyChart').getContext('2d');
        const statusEl = document.getElementById('status');

        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Latency (ms)', data: [], borderColor: '#00ffcc', tension: 0.4, fill: true, backgroundColor: 'rgba(0,255,204,0.1)' }] },
            options: { responsive: true, maintainAspectRatio: false }
        });

        async function updateStats() {
            try {
                const res = await fetch(`${API_URL}/stats`);
                const data = await res.json();
                if (data.length > 0) {
                    chart.data.labels = data.map(d => new Date(d.created_at).toLocaleTimeString());
                    chart.data.datasets[0].data = data.map(d => d.ping_ms);
                    chart.update();
                    statusEl.innerText = `Live: ${data[data.length-1].ping_ms}ms`;
                }
            } catch (e) { statusEl.innerText = "Reconnecting..."; }
        }

        async function searchMusic() {
            const q = document.getElementById('query').value;
            const resDiv = document.getElementById('results');
            resDiv.innerHTML = "Searching Discogs...";

            try {
                const res = await fetch(`${API_URL}/search-album?q=${q}`);
                const data = await res.json();
                
                if (data.error) throw new Error(data.error);

                resDiv.innerHTML = data.results.map(item => `
                    <div class="album">
                        <img src="${item.cover_image}" alt="art">
                        <p>${item.title}</p>
                    </div>
                `).join('');
            } catch (e) {
                resDiv.innerHTML = `<p style="color:#ff4444">Search Failed: ${e.message}</p>`;
            }
        }

        setInterval(updateStats, 5000);
        updateStats();
    </script>
</body>
</html>
