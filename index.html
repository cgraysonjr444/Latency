<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VINYL PULSE 💿</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💿</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root { --primary: #00ffcc; --latency: #ff0077; --bg: #121212; --card: #1e1e1e; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        .box { background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid #333; max-width: 450px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .chart-container { background: #000; padding: 10px; border-radius: 15px; margin: 15px 0; border: 1px solid #222; height: 200px; position: relative; }
        
        #preview-container { display: none; margin: 20px auto; width: 140px; height: 140px; }
        #album-preview { 
            width: 140px; height: 140px; border-radius: 50%; border: 5px solid #000;
            box-shadow: 0 0 15px var(--primary); object-fit: cover;
        }

        @keyframes record-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .vitals { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .v-card { background: #111; padding: 10px; border-radius: 12px; border: 1px solid #222; }
        .v-val { font-size: 1.4rem; font-weight: bold; color: var(--primary); }
        .rpm-text { color: var(--latency) !important; }
        
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #444; background: #111; color: white; box-sizing: border-box; margin-bottom: 10px; font-size: 1rem; outline: none; }
        button#main-btn { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--primary); background: transparent; color: var(--primary); font-weight: bold; cursor: pointer; }
        button#main-btn:disabled { border-color: #444; color: #444; }
        
        .history { margin-top: 20px; text-align: left; max-width: 450px; margin: 20px auto; padding-bottom: 50px; }
        .log { display: flex; align-items: center; gap: 12px; padding: 12px; border-bottom: 1px solid #222; font-size: 0.85rem; }
        .log-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 1px solid #444; }
        #status { font-size: 0.7rem; color: #888; margin-bottom: 10px; height: 1em; }
    </style>
</head>
<body>
    <h1 style="letter-spacing: 3px;">VINYL PULSE 💿</h1>
    <div class="box">
        <a href="/auth/google" style="text-decoration:none; color:#888; font-size:0.7rem; border:1px solid #444; padding:5px 10px; border-radius:10px; display:inline-block; margin-bottom:10px;">Sync Health Vitals 🏃</a>
        <div class="chart-container"><canvas id="pulseChart"></canvas></div>
        
        <div id="preview-container"><img id="album-preview" src=""></div>

        <div class="vitals">
            <div class="v-card"><div class="v-val" id="hr-display">--</div><div style="font-size:0.6rem;color:#888">BPM (HEART)</div></div>
            <div class="v-card"><div class="v-val rpm-text" id="rpm-display">33.30</div><div style="font-size:0.6rem;color:#888">RPM (LATENCY)</div></div>
        </div>

        <input type="text" id="search" placeholder="Search Album + Enter" autocomplete="off">
        <div id="status">Ready</div>
        <button id="main-btn" onclick="logSession()">LOG PERFORMANCE 🚀</button>
    </div>
    <div class="history" id="history"></div>

    <script>
        const API_BASE = "https://latency-8zo5.onrender.com";
        let lastThumb = "";
        let myChart = null;
        const params = new URLSearchParams(window.location.search);
        const currentUser = params.get('user') || localStorage.getItem('vp_user') || "guest_user";
        
        if (params.get('user')) localStorage.setItem('vp_user', params.get('user'));
        if (params.get('bpm')) document.getElementById('hr-display').innerText = params.get('bpm');

        document.getElementById('search').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                document.getElementById('status').innerText = "Searching...";
                const res = await fetch(`${API_BASE}/search-album?q=${encodeURIComponent(e.target.value)}`);
                const data = await res.json();
                if (data.length > 0) {
                    e.target.value = data[0].title;
                    lastThumb = data[0].thumb;
                    document.getElementById('album-preview').src = lastThumb;
                    document.getElementById('preview-container').style.display = 'block';
                    document.getElementById('status').innerText = "Record Found.";
                }
            }
        });

        async function logSession() {
            const albumName = document.getElementById('search').value;
            if (!albumName) return;

            const img = document.getElementById('album-preview');
            const btn = document.getElementById('main-btn');

            // --- THE SPIN LOGIC ---
            img.style.animation = "none";
            img.offsetHeight; // Force reflow
            img.style.animation = "record-spin 1.5s linear infinite";
            
            btn.innerText = "SPINNING...";
            btn.disabled = true;

            const payload = {
                user_email: currentUser,
                album: albumName,
                thumb: lastThumb,
                hr: parseInt(document.getElementById('hr-display').innerText) || 72,
                rpm: (33.3 + (Math.random() * 0.04 - 0.02)).toFixed(2),
                timestamp: new Date().toISOString()
            };

            await fetch(`${API_BASE}/spin`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            
            setTimeout(async () => {
                document.getElementById('preview-container').style.display = 'none';
                img.style.animation = "none";
                document.getElementById('search').value = "";
                await loadHistory();
                btn.innerText = "LOG PERFORMANCE 🚀";
                btn.disabled = false;
            }, 1500);
        }

        async function loadHistory() {
            const res = await fetch(`${API_BASE}/data?user=${encodeURIComponent(currentUser)}`);
            const data = await res.json();
            document.getElementById('history').innerHTML = data.map(i => `
                <div class="log">
                    <img class="log-img" src="${i.data.thumb}" onerror="this.src='https://via.placeholder.com/45'">
                    <div style="flex:1"><strong>${i.data.album}</strong><br><span style="color:var(--primary)">${i.data.hr} BPM</span> | <span style="color:var(--latency)">${i.data.rpm} RPM</span></div>
                </div>`).join('');
            updateChart(data.slice(0, 10).reverse());
        }

        function updateChart(recentData) {
            const ctx = document.getElementById('pulseChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: recentData.map((_, i) => i + 1),
                    datasets: [
                        { label: 'BPM', data: recentData.map(i => i.data.hr), borderColor: '#00ffcc', tension: 0.4 },
                        { label: 'RPM', data: recentData.map(i => parseFloat(i.data.rpm)), borderColor: '#ff0077', yAxisID: 'y1' }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { y: { ticks: { color: '#00ffcc', font: { size: 8 } } }, y1: { position: 'right', suggestedMin: 33.2, suggestedMax: 33.4, ticks: { color: '#ff0077', font: { size: 8 } } }, x: { display: false } },
                    plugins: { legend: { display: false } }
                }
            });
        }
        window.onload = loadHistory;
    </script>
</body>
</html>
