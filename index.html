<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VINYL PULSE 💿</title>
    <style>
        :root { --primary: #00ffcc; --workout: #ff6600; --bg: #121212; --card: #1e1e1e; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 20px; }
        body.workout-mode { --primary: var(--workout); }
        .box { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #333; max-width: 400px; margin: 0 auto; }
        .vitals { display: none; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .v-card { background: #111; padding: 10px; border-radius: 12px; border: 1px solid #222; }
        .v-val { font-size: 1.4rem; font-weight: bold; color: var(--primary); }
        #video-feed { display: none; width: 100%; aspect-ratio: 1/1; border-radius: 15px; margin-bottom: 15px; border: 2px solid var(--primary); object-fit: cover; }
        .btn-row { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; }
        .btn-s { flex: 1; font-size: 0.7rem; padding: 10px; border-radius: 20px; border: 1px solid #444; background: transparent; color: #888; text-decoration: none; display: flex; align-items: center; justify-content: center; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #444; background: #111; color: white; box-sizing: border-box; margin-bottom: 10px; }
        button#main-btn { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--primary); background: transparent; color: var(--primary); font-weight: bold; font-size: 1rem; }
        .history { margin-top: 30px; text-align: left; max-width: 400px; margin: 30px auto 0; }
        .log { display: flex; align-items: center; gap: 15px; padding: 12px; border-bottom: 1px solid #222; }
        .log-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        .log-info { flex: 1; }
        .am-link { font-size: 0.7rem; color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>
    <h1 id="header">VINYL PULSE 💿</h1>
    <div class="box">
        <div class="btn-row">
            <button class="btn-s" id="w-btn" onclick="toggleWorkout()">Workout Hub 🔥</button>
            <a href="/auth/google" class="btn-s">Sync Health 🏃</a>
        </div>
        <div class="vitals" id="vitals">
            <div class="v-card"><div class="v-val" id="hr">--</div><div style="font-size:0.6rem;color:#888">HR</div></div>
            <div class="v-card"><div class="v-val" id="cal">--</div><div style="font-size:0.6rem;color:#888">CAL</div></div>
        </div>
        <video id="video-feed" autoplay playsinline></video>
        <input type="text" id="search" placeholder="Search Discogs...">
        <div id="status" style="font-size: 0.7rem; margin: 10px; color: #555;">Ready</div>
        <button id="main-btn" onclick="logSession()">LOG PERFORMANCE 🚀</button>
    </div>
    <div class="history" id="history"></div>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const RENDER_URL = "https://latency-8zo5.onrender.com";
        let isWorkout = false;
        let lastThumb = "";

        async function toggleWorkout() {
            isWorkout = !isWorkout;
            document.body.classList.toggle('workout-mode');
            document.getElementById('vitals').style.display = isWorkout ? 'grid' : 'none';
            document.getElementById('video-feed').style.display = isWorkout ? 'block' : 'none';
            if (isWorkout) startCam();
        }

        async function startCam() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('video-feed').srcObject = stream;
        }

        document.getElementById('search').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const res = await fetch(`${RENDER_URL}/search-album?q=${encodeURIComponent(e.target.value)}`);
                const data = await res.json();
                if (data.length > 0) {
                    e.target.value = data[0].title;
                    lastThumb = data[0].thumb;
                    document.getElementById('status').innerText = "Album Found 💿";
                }
            }
        });

        async function logSession() {
            const payload = {
                album: document.getElementById('search').value || "Unknown Spin",
                thumb: lastThumb,
                rpm: (33.3 + Math.random() * 0.05).toFixed(2),
                mode: isWorkout ? 'workout' : 'standard'
            };
            await fetch(`${RENDER_URL}/spin`, { method: 'POST', body: JSON.stringify(payload) });
            loadHistory();
        }

        async function loadHistory() {
            const res = await fetch(`${RENDER_URL}/data`);
            const data = await res.json();
            document.getElementById('history').innerHTML = data.map(i => `
                <div class="log">
                    <img class="log-img" src="${i.data.thumb || 'https://via.placeholder.com/50'}">
                    <div class="log-info">
                        <div style="font-weight:bold">${i.data.album}</div>
                        <a class="am-link" href="https://music.apple.com/search?term=${encodeURIComponent(i.data.album)}" target="_blank">Listen on Apple Music 🎵</a>
                    </div>
                </div>
            `).join('');
        }

        if (window.location.search.includes('auth=success')) {
            alert("Health Synced!");
            document.getElementById('hr').innerText = "78"; 
        }

        window.onload = loadHistory;
    </script>
</body>
</html>
