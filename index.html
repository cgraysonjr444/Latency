<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VINYL PULSE 💿</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💿</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root { --primary: #00ffcc; --latency: #ff0077; --bg: #0a0a0a; --card: #161616; --gold: #ffd700; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        
        .box { background: var(--card); padding: 20px; border-radius: 24px; border: 1px solid #222; max-width: 450px; margin: 0 auto; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .chart-container { background: #000; padding: 10px; border-radius: 18px; margin: 15px 0; border: 1px solid #1a1a1a; height: 200px; position: relative; }
        
        #preview-container { display: none; margin: 20px auto; width: 140px; height: 140px; }
        #album-preview { width: 140px; height: 140px; border-radius: 50%; border: 5px solid #000; box-shadow: 0 0 25px var(--primary); object-fit: cover; display: block; margin: 0 auto; }
        @keyframes record-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .vitals { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .v-card { background: #000; padding: 12px; border-radius: 15px; border: 1px solid #222; }
        .v-val { font-size: 1.6rem; font-weight: 800; color: var(--primary); }
        .rpm-text { color: var(--latency) !important; }
        
        .badge-container { margin: 20px auto; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .count-badge { background: #000; border: 1px solid var(--primary); padding: 8px 18px; border-radius: 25px; font-size: 0.8rem; color: var(--primary); font-weight: bold; letter-spacing: 1px; transition: all 0.4s ease; }

        input { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; margin-bottom: 12px; font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,255,204,0.2); }
        
        button#main-btn { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid var(--primary); background: transparent; color: var(--primary); font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
        button#main-btn:active { background: var(--primary); color: black; transform: scale(0.98); }
        button#main-btn:disabled { border-color: #444; color: #444; cursor: not-allowed; }
        
        .history-wrap { margin-top: 30px; text-align: left; max-width: 450px; margin: 30px auto; padding-bottom: 60px; }
        .log { display: flex; align-items: center; gap: 15px; padding: 12px; border-bottom: 1px solid #1a1a1a; font-size: 0.9rem; animation: fadeIn 0.5s ease; }
        .log-img { width: 50px; height: 50px; border-radius: 50%; border: 1px solid #333; object-fit: cover; }
        #status { font-size: 0.75rem; color: #666; margin-top: 12px; min-height: 1.5em; font-weight: 500; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <h1 style="letter-spacing: 4px; font-size: 1.6rem; margin: 20px 0;">VINYL PULSE 💿</h1>
    
    <div class="box">
        <div class="chart-container"><canvas id="pulseChart"></canvas></div>
        
        <div id="preview-container"><img id="album-preview" src=""></div>
        
        <div class="vitals">
            <div class="v-card"><div class="v-val" id="hr-display">--</div><div style="font-size:0.65rem;color:#666">BPM (HEART)</div></div>
            <div class="v-card"><div class="v-val rpm-text" id="rpm-display">33.30</div><div style="font-size:0.65rem;color:#666">RPM (LATENCY)</div></div>
        </div>

        <input type="text" id="search" placeholder="Search Album + Enter" autocomplete="off">
        <button id="main-btn" onclick="logSession()">LOG PERFORMANCE 🚀</button>
        <p id="status">System Ready</p>
    </div>

    <div class="history-wrap">
        <div class="badge-container">
            <div class="count-badge" id="badge-frame">TOTAL SPINS: <span id="total-count">0</span></div>
            <button onclick="loadHistory()" style="background:none; border:none; color:#444; cursor:pointer; font-size:1.2rem;">🔄</button>
        </div>
        <div id="history"></div>
    </div>

    <script>
        const API_BASE = "https://latency-8zo5.onrender.com";
        let lastThumb = "";
        let myChart = null;

        // Init User
        const params = new URLSearchParams(window.location.search);
        const currentUser = params.get('user') || localStorage.getItem('vp_user') || "guest_user";
        if (params.get('user')) localStorage.setItem('vp_user', params.get('user'));
        if (params.get('bpm')) document.getElementById('hr-display').innerText = params.get('bpm');

        // --- SEARCH ---
        document.getElementById('search').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const query = e.target.value.trim();
                if (!query) return;
                document.getElementById('status').innerText = "Querying Discogs...";
                try {
                    const res = await fetch(`${API_BASE}/search-album?q=${encodeURIComponent(query)}`);
                    const data = await res.json();
                    if (data && data.length > 0) {
                        e.target.value = data[0].title;
                        lastThumb = data[0].thumb;
                        document.getElementById('album-preview').src = lastThumb;
                        document.getElementById('preview-container').style.display = 'block';
                        document.getElementById('status').innerText = "Record Synchronized.";
                    }
                } catch (err) { document.getElementById('status').innerText = "Search failed."; }
            }
        });

        // --- LOGGING ---
        async function logSession() {
            const albumName = document.getElementById('search').value;
            if (!albumName) return;
            const img = document.getElementById('album-preview');
            const btn = document.getElementById('main-btn');

            // Visual Trigger
            img.style.animation = "record-spin 1s linear infinite";
            btn.innerText = "SPINNING...";
            btn.disabled = true;

            const payload = {
                user_email: currentUser,
                album: albumName,
                thumb: lastThumb,
                hr: parseInt(document.getElementById('hr-display').innerText) || 72,
                rpm: (33.3 + (Math.random() * 0.04 - 0.02)).toFixed(2),
                timestamp: new Date().toISOString()
            };

            try {
                const saveTask = fetch(`${API_BASE}/spin`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });

                // Performance Window (1.5s spin)
                setTimeout(async () => {
                    await saveTask;
                    document.getElementById('preview-container').style.display = 'none';
                    img.style.animation = "none";
                    document.getElementById('search').value = "";
                    document.getElementById('status').innerText = "Pulse Captured!";
                    await loadHistory();
                    btn.innerText = "LOG PERFORMANCE 🚀";
                    btn.disabled = false;
                }, 1500);
            } catch (e) {
                document.getElementById('status').innerText = "Sync Error.";
                btn.disabled = false;
            }
        }

        // --- DATA & CHART SYNC ---
        async function loadHistory() {
            try {
                const res = await fetch(`${API_BASE}/data?user=${encodeURIComponent(currentUser)}&_t=${Date.now()}`);
                const data = await res.json();
                
                document.getElementById('total-count').innerText = data.length || 0;
                
                // Milestone Badge
                if (data.length >= 10) {
                    const badge = document.getElementById('badge-frame');
                    badge.style.borderColor = "var(--gold)";
                    badge.style.color = "var(--gold)";
                    badge.style.boxShadow = "0 0 15px rgba(255, 215, 0, 0.2)";
                }

                const historyDiv = document.getElementById('history');
                if (!data || data.length === 0) {
                    historyDiv.innerHTML = "<p style='color:#444; text-align:center; padding:20px;'>No spins on record.</p>";
                    updateChart([]);
                    return;
                }

                historyDiv.innerHTML = data.map(i => {
                    const d = i.data || {};
                    return `<div class="log">
                        <img class="log-img" src="${d.thumb || ''}" onerror="this.src='https://via.placeholder.com/50?text=💿'">
                        <div style="flex:1"><strong>${d.album}</strong><br><span style="color:var(--primary)">${d.hr} BPM</span> | <span style="color:var(--latency)">${d.rpm} RPM</span></div>
                    </div>`;
                }).join('');

                // Force Chart Sync
                updateChart(data.slice(0, 10).reverse());
            } catch (e) { console.error("Load failed"); }
        }

        function updateChart(recentData) {
            const ctx = document.getElementById('pulseChart').getContext('2d');
            
            // Log to console for debugging sync
            console.table(recentData.map(i => ({ album: i.data.album, bpm: i.data.hr, rpm: i.data.rpm })));

            if (myChart) myChart.destroy();
            
            const bpmPoints = recentData.map(i => i.data.hr || 70);
            const rpmPoints = recentData.map(i => parseFloat(i.data.rpm) || 33.3);
            const labels = recentData.map((_, i) => i + 1);

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'BPM', data: bpmPoints, borderColor: '#00ffcc', tension: 0.4, fill: true, backgroundColor: 'rgba(0,255,204,0.08)', yAxisID: 'y', borderWidth: 3 },
                        { label: 'RPM', data: rpmPoints, borderColor: '#ff0077', yAxisID: 'y1', pointRadius: 4, pointBackgroundColor: '#ff0077', borderWidth: 2 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    animation: { duration: 1000, easing: 'easeOutQuart' },
                    scales: { 
                        y: { suggestedMin: 50, suggestedMax: 160, ticks: { color: '#00ffcc', font: { size: 10, weight: 'bold' } }, grid: { color: 'rgba(255,255,255,0.05)' } }, 
                        y1: { position: 'right', suggestedMin: 33.1, suggestedMax: 33.5, ticks: { color: '#ff0077', font: { size: 10, weight: 'bold' } }, grid: { display: false } }, 
                        x: { ticks: { color: '#333' } } 
                    },
                    plugins: { legend: { display: false } }
                }
            });
            myChart.update();
        }
        
        window.onload = loadHistory;
    </script>
</body>
</html>
