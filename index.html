<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinyl Pulse | cgraysonjr444</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root { --bg: #0b0e14; --accent: #00ffcc; --card: #151921; --text: #c9d1d9; }
        
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', -apple-system, sans-serif; 
            text-align: center; padding: 20px; margin: 0; 
        }

        /* VINYL PULSE ICON */
        .pulse-node { 
            width: 12px; height: 12px; background: var(--accent); border-radius: 50%;
            display: inline-block; margin-right: 10px; position: relative;
        }
        .pulse-node::after {
            content: ''; position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; background: var(--accent); border-radius: 50%;
            animation: ring-pulse 1.8s infinite;
        }
        @keyframes ring-pulse { 
            0% { transform: scale(1); opacity: 0.8; } 
            100% { transform: scale(3.5); opacity: 0; } 
        }

        #chart-container { 
            height: 380px; width: 95%; max-width: 900px; 
            margin: 20px auto; background: var(--card); border-radius: 16px; 
            padding: 20px; border: 1px solid #30363d;
            box-shadow: 0 10px 50px rgba(0,0,0,0.6);
        }

        /* SEARCH INTERFACE */
        .search-container { margin-top: 40px; padding-bottom: 50px; }
        .search-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        
        input { 
            padding: 14px; border-radius: 10px; border: 1px solid #30363d; 
            background: #000; color: white; width: 320px; outline: none;
            font-size: 1rem;
        }
        input:focus { border-color: var(--accent); }
        
        button { 
            padding: 14px 28px; background: var(--accent); color: var(--bg); 
            border: none; border-radius: 10px; font-weight: bold; 
            cursor: pointer; transition: 0.2s;
        }
        button:hover { transform: scale(1.03); background: #00e6b8; }

        /* VINYL GRID & SPIN ANIMATION */
        #results { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 25px; max-width: 1100px; margin: 0 auto; 
        }
        .album { 
            background: var(--card); border-radius: 12px; overflow: hidden; 
            border: 1px solid #333; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer;
        }
        .album:hover { transform: translateY(-10px); border-color: var(--accent); }
        
        .album img { 
            width: 100%; aspect-ratio: 1/1; object-fit: cover; 
            transition: border-radius 0.5s, transform 0.5s;
        }

        /* THE SPIN CLASS */
        .playing img {
            animation: rotate-vinyl 3s linear infinite;
            border-radius: 50% !important;
            border: 5px solid #111;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.4);
        }

        @keyframes rotate-vinyl {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .album p { font-size: 0.75rem; padding: 12px; margin: 0; font-weight: 500; height: 40px; }

        #status-bar { font-family: monospace; font-size: 0.85rem; color: #8b949e; margin-bottom: 15px; }
    </style>
</head>
<body>

    <header>
        <h1><span class="pulse-node"></span>Vinyl <span style="color:var(--accent)">Pulse</span></h1>
        <div id="status-bar">Syncing with Render engine...</div>
    </header>

    <div id="chart-container">
        <canvas id="latencyChart"></canvas>
    </div>

    <div class="search-container">
        <div class="search-bar">
            <input type="text" id="albumQuery" placeholder="Search Artists or Albums..." onkeypress="if(event.key==='Enter') searchMusic()">
            <button onclick="searchMusic()">Search Discogs</button>
        </div>
        <div id="results"></div>
    </div>

    <script>
        const API_URL = "https://latency-8zo5.onrender.com";
        const ctx = document.getElementById('latencyChart').getContext('2d');
        const statusLog = document.getElementById('status-bar');

        // 1. CHART INITIALIZATION
        const myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Latency (ms)',
                    data: [],
                    borderColor: '#00ffcc',
                    backgroundColor: 'rgba(0, 255, 204, 0.08)',
                    borderWidth: 3,
                    tension: 0.4,
                    fill: true,
                    pointRadius: 4,
                    pointBackgroundColor: '#00ffcc'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, grid: { color: '#222' }, ticks: { color: '#888' } },
                    x: { grid: { display: false }, ticks: { color: '#888' } }
                },
                plugins: { legend: { display: false } }
            }
        });

        // 2. SAFE FETCH WRAPPER
        async function fetchSafeJSON(endpoint, options = {}) {
            try {
                const response = await fetch(endpoint, options);
                const contentType = response.headers.get("content-type");
                if (contentType && contentType.includes("application/json")) {
                    return await response.json();
                }
                return null;
            } catch (err) {
                console.error("Fetch error:", err);
                return null;
            }
        }
