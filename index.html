<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latency Monitor | cgraysonjr444</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #00ffcc; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; text-align: center; padding: 20px; margin: 0; }
        
        /* 2. THE VISIBILITY FIX: Absolute 400px height prevents "Zero-Height" collapse */
        #chart-container { 
            position: relative; 
            height: 400px; 
            width: 95%; 
            max-width: 850px; 
            margin: 20px auto; 
            background: var(--card);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .stats { margin-top: 15px; font-family: monospace; font-size: 0.9rem; }
        #status-dot { height: 10px; width: 10px; background-color: #8b949e; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .live { background-color: #238636 !important; box-shadow: 0 0 8px #238636; }
    </style>
</head>
<body>

    <h1>Latency <span style="color:var(--accent)">Pulse</span></h1>
    <div class="stats">
        <span id="status-dot"></span> Status: <span id="status-text">Connecting...</span>
    </div>

    <div id="chart-container">
        <canvas id="latencyChart"></canvas>
    </div>

    <script>
        // --- CONFIGURATION ---
        // REPLACE THIS with your specific Render Web Service URL
        const API_URL = "https://your-service-name.onrender.com"; 

        const ctx = document.getElementById('latencyChart').getContext('2d');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');

        // --- 3. INITIALIZE CHART WITH BOOT-UP DATA ---
        // This ensures the chart is NEVER blank on stage.
        const myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['System', 'Initializing', 'Ready'],
                datasets: [{
                    label: 'Latency (ms)',
                    data: [15, 12, 14],
                    borderColor: '#8b949e', // Gray until live data hits
                    backgroundColor: 'rgba(139, 148, 158, 0.1)',
                    borderWidth: 2,
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, grid: { color: '#30363d' }, ticks: { color: '#8b949e' } },
                    x: { grid: { display: false }, ticks: { color: '#8b949e' } }
                },
                plugins: { legend: { display: false } }
            }
        });

        // --- 4. DATA SYNC LOGIC ---
        async function fetchLatency() {
            try {
                const response = await fetch(`${API_URL}/stats`);
                if (!response.ok) throw new Error("Server Offline");
                
                const data = await response.json();

                if (data && data.length > 0) {
                    // Update Chart to LIVE mode
                    myChart.data.labels = data.map(d => new Date(d.created_at).toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' }));
                    myChart.data.datasets[0].data = data.map(d => d.ping_ms);
                    
                    // Change colors to the "Live" Accent
                    myChart.data.datasets[0].borderColor = '#00ffcc';
                    myChart.data.datasets[0].backgroundColor = 'rgba(0, 255, 204, 0.1)';
                    
                    myChart.update('none'); // Update without flickering

                    statusText.innerText = `Live: ${data[data.length-1].ping_ms}ms`;
                    statusDot.classList.add('live');
                } else {
                    statusText.innerText = "Connected: Database Empty";
                }
            } catch (err) {
                console.error("Dashboard Sync Failed:", err);
                statusText.innerText = "Offline: Check API URL";
                statusDot.classList.remove('live');
            }
        }

        // Refresh every 5 seconds
        setInterval(fetchLatency, 5000);
        fetchLatency();
    </script>
</body>
</html>
