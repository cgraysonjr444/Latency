<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VINYL PULSE 💿</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22VinylPulse%22,%22short_name%22:%22Pulse%22,%22start_url%22:%22/%22,%22display%22:%22standalone%22,%22background_color%22:%22#121212%22,%22theme_color%22:%22#00ffcc%22}">

    <style>
        :root { 
            --primary-color: #00ffcc; 
            --dark-bg: #121212; 
            --card-bg: #1e1e1e; 
        }
        body.workout-mode { --primary-color: #ff6600; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--dark-bg); 
            color: white; 
            text-align: center; 
            padding: env(safe-area-inset-top) 1rem 2rem 1rem;
            margin: 0;
            transition: background 0.5s ease, color 0.3s;
        }

        h1 { font-size: 2rem; letter-spacing: 2px; margin-top: 1rem; transition: color 0.3s; }
        .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 1.5rem; }
        
        .box { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 16px; 
            border: 1px solid #333; 
            display: inline-block; 
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-small { font-size: 0.7rem; padding: 6px 12px; border-radius: 20px; border: 1px solid #555; background: transparent; color: #888; cursor: pointer; }
        .btn-small.active { border-color: var(--primary-color); color: var(--primary-color); }

        /* Vitals Dashboard */
        #vitals-grid { 
            display: none; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-bottom: 15px; 
        }
        .vital-card { 
            background: #111; 
            padding: 10px; 
            border-radius: 10px; 
            border: 1px solid #222; 
        }
        .vital-value { font-size: 1.2rem; font-weight: bold; color: var(--primary-color); }
        .vital-label { font-size: 0.6rem; color: #888; text-transform: uppercase; }

        /* Camera Feed */
        #camera-container {
            display: none;
            width: 100%;
            aspect-ratio: 1/1;
            margin: 0 auto 15px auto;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--primary-color);
            background: #000;
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* Search & Inputs */
        .search-box { margin-bottom: 15px; position: relative; }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #444;
            background: #111;
            color: white;
            outline: none;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--primary-color); }

        #search-results {
            background: #252525;
            border-radius: 0 0 10px 10px;
            max-height: 150px;
            overflow-y: auto;
            position: absolute;
            width: 100%;
            z-index: 10;
        }
        .result-item {
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border-bottom: 1px solid #333;
            text-align: left;
            font-size: 0.8rem;
        }
        .result-item img { width: 35px; height: 35px; border-radius: 4px; }

        .selected-badge {
            background: #2a2a2a;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--primary-color);
        }

        .status { margin: 10px 0; font-weight: 600; font-size: 0.9rem; }
        .primary { color: var(--primary-color); }
        
        .btn-group { display: flex; gap: 8px; justify-content: center; }
        button#spin-btn {
            background: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            flex: 1;
            transition: 0.3s;
        }
        button#spin-btn:hover { background: var(--primary-color); color: black; }
        .btn-secondary { border-color: #555; color: #888; background: transparent; padding: 10px; border-radius: 8px; cursor: pointer; }

        /* History Table */
        .history-container { width: 100%; max-width: 800px; margin: 20px auto; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { padding: 12px; color: var(--primary-color); font-size: 0.7rem; text-transform: uppercase; border-bottom: 2px solid #333; text-align: center; }
        td { padding: 12px; border-bottom: 1px solid #222; font-size: 0.85rem; text-align: center; }
        .album-art { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; }
        .progress-img { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--primary-color); object-fit: cover; }
        .listen-link { font-size: 0.65rem; color: var(--primary-color); text-decoration: none; display: block; margin-top: 4px; }
    </style>
</head>
<body>

    <h1 id="main-title">VINYL PULSE 💿</h1>
    <p class="subtitle" id="main-subtitle">Audio & Fitness Data Pipeline</p>

    <div class="box">
        <div class="header-actions">
            <button class="btn-small" onclick="toggleWorkoutMode()" id="mode-btn">Workout Hub 🔥</button>
            <button class="btn-small" onclick="syncHealth()">Sync Health 🏃</button>
        </div>

        <div id="vitals-grid">
            <div class="vital-card">
                <div class="vital-value" id="live-bpm">--</div>
                <div class="vital-label">Heart Rate</div>
            </div>
            <div class="vital-card">
                <div class="vital-value" id="live-cal">--</div>
                <div class="vital-label">Calories</div>
            </div>
        </div>

        <div id="camera-container">
            <video id="video" autoplay playsinline></video>
        </div>

        <div class="search-box">
            <input type="text" id="album-input" placeholder="Search Discogs..." autocomplete="off">
            <div id="search-results"></div>
        </div>

        <div id="selected-display" style="display: none;" class="selected-badge">
            <img id="sel-img" src="" class="album-art">
            <div style="text-align: left;">
                <div id="sel-title" style="font-weight: bold; font-size: 0.8rem;"></div>
                <div style="font-size: 0.6rem; color: #888;">Selected for log</div>
            </div>
        </div>

        <div id="server-status" class="status">Connecting...</div>
        
        <div class="btn-group">
            <button id="spin-btn" onclick="sendTestSpin()">LOG PERFORMANCE 🚀</button>
            <button class="btn-secondary" onclick="downloadCSV()">📊</button>
        </div>
    </div>

    <div class="history-container">
        <table>
            <thead>
                <tr>
                    <th style="text-align: left;">Entry</th>
                    <th>RPM</th>
                    <th>Latency</th>
                    <th style="text-align: right;">Time</th>
                </tr>
            </thead>
            <tbody id="history-body"></tbody>
        </table>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const RENDER_URL = "https://latency-8zo5.onrender.com";
        const DEFAULT_IMG = "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=100&h=100&fit=crop&auto=format";
        let selectedAlbum = null;
        let isWorkoutMode = false;
        let stream = null;

        // --- CORE FUNCTIONS ---

        async function toggleWorkoutMode() {
            isWorkoutMode = !isWorkoutMode;
            document.body.classList.toggle('workout-mode');
            const videoContainer = document.getElementById('camera-container');
            const vitals = document.getElementById('vitals-grid');
            const btn = document.getElementById('mode-btn');
            const title = document.getElementById('main-title');

            if (isWorkoutMode) {
                btn.innerText = "Music Mode 🎵";
                btn.classList.add('active');
                title.innerText = "WORKOUT HUB ⚡";
                videoContainer.style.display = "block";
                vitals.style.display = "grid";
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    document.getElementById('video').srcObject = stream;
                } catch (err) { console.error("Camera error"); }
            } else {
                btn.innerText = "Workout Hub 🔥";
                btn.classList.remove('active');
                title.innerText = "VINYL PULSE 💿";
                videoContainer.style.display = "none";
                vitals.style.display = "none";
                if (stream) stream.getTracks().forEach(t => t.stop());
            }
        }

        function syncHealth() {
            window.location.href = `${RENDER_URL}/auth/google`;
        }

        function captureSnapshot() {
            if (!isWorkoutMode) return null;
            const canvas = document.getElementById('canvas');
            canvas.width = 100; canvas.height = 100;
            canvas.getContext('2d').drawImage(document.getElementById('video'), 0, 0, 100, 100);
            return canvas.toDataURL('image/jpeg', 0.5);
        }

        // --- API INTERACTIONS ---

        const albumInput = document.getElementById('album-input');
        albumInput.addEventListener('input', async (e) => {
            const q = e.target.value;
            if (q.length < 3) return;
            try {
                const res = await fetch(`${RENDER_URL}/search-album?q=${encodeURIComponent(q)}`);
                const items = await res.json();
                document.getElementById('search-results').innerHTML = items.map(item => `
                    <div class="result-item" onclick="selectAlbum('${item.title.replace(/'/g, "\\'")}', '${item.thumb || DEFAULT_IMG}')">
                        <img src="${item.thumb || DEFAULT_IMG}">
                        <span>${item.title}</span>
                    </div>
                `).join('');
            } catch (err) { console.error(err); }
        });

        function selectAlbum(title, thumb) {
            selectedAlbum = { title, thumb };
            document.getElementById('selected-display').style.display = "flex";
            document.getElementById('sel-img').src = thumb;
            document.getElementById('sel-title').innerText = title;
            document.getElementById('search-results').innerHTML = "";
            albumInput.value = "";
        }

        async function updateDashboard() {
            try {
                const response = await fetch(`${RENDER_URL}/data`);
                const data = await response.json();
                document.getElementById('server-status').innerText = "SYSTEM ONLINE ✅";
                document.getElementById('server-status').className = "status primary";

                const historyBody = document.getElementById('history-body');
                historyBody.innerHTML = "";
                data.forEach(row => {
                    const tr = document.createElement('tr');
                    const time = new Date(row.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    const isWorkout = row.data?.mode === 'workout';
                    const albumTitle = row.data?.album?.title || "Session";
                    const amLink = `https://music.apple.com/search?term=${encodeURIComponent(albumTitle)}`;
                    
                    tr.innerHTML = `
                        <td style="display: flex; align-items: center; gap: 12px; text-align: left; border: none;">
                            ${row.data?.photo ? `<img src="${row.data.photo}" class="progress-img">` : `<img src="${row.data?.album?.thumb || DEFAULT_IMG}" class="album-art">`}
                            <div>
                                <div style="font-weight: bold; font-size: 0.8rem;">${albumTitle}</div>
                                <a href="${amLink}" target="_blank" class="listen-link">▶ Apple Music</a>
                            </div>
                        </td>
                        <td>${row.data?.rpm || "--"}</td>
                        <td class="primary">${row.data?.latency || "--"}ms</td>
                        <td style="text-align: right; color: #555; font-size: 0.7rem;">${time}</td>
                    `;
                    historyBody.appendChild(tr);
                });
            } catch (err) { 
                document.getElementById('server-status').innerText = "SYSTEM OFFLINE ❌";
                document.getElementById('server-status').className = "status red";
            }
        }

        async function sendTestSpin() {
            const btn = document.getElementById('spin-btn');
            btn.disabled = true;
            const photo = captureSnapshot();

            try {
                const payload = {
                    rpm: (33.3 + (Math.random() * 0.05)).toFixed(2),
                    latency: Math.floor(Math.random() * 30) + 15,
                    album: selectedAlbum || { title: isWorkoutMode ? "Workout Session" : "Generic Spin", thumb: DEFAULT_IMG },
                    mode: isWorkoutMode ? 'workout' : 'standard',
                    photo: photo,
                    vitals: isWorkoutMode ? { hr: document.getElementById('live-bpm').innerText, cal: document.getElementById('live-cal').innerText } : null
                };

                await fetch(`${RENDER_URL}/spin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (!isWorkoutMode) {
                    selectedAlbum = null;
                    document.getElementById('selected-display').style.display = "none";
                }
                updateDashboard();
            } catch (err) { alert("Save Failed"); }
            finally { btn.disabled = false; }
        }

        // --- POST-AUTH UI LOGIC ---
        window.addEventListener('DOMContentLoaded', () => {
            if (window.location.search.includes('auth=success')) {
                // Trigger visual sync success
                document.getElementById('live-bpm').innerText = "74";
                document.getElementById('live-cal').innerText = "185";
                document.getElementById('server-status').innerText = "BIOMETRICS SYNCED ✅";
                
                // Switch to Workout Mode automatically
                if (!isWorkoutMode) toggleWorkoutMode();
                
                // Clean URL
                window.history.replaceState({}, document.title, "/");
            }
            updateDashboard();
        });

        function downloadCSV() { /* Export Logic */ }
    </script>
</body>
</html>
