<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latency Monitor | cgraysonjr444</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --accent: #00ffcc;
            --border: #30363d;
            --text: #c9d1d9;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 { color: var(--accent); margin-bottom: 5px; }
        .subtitle { opacity: 0.6; margin-bottom: 30px; font-size: 0.9rem; }

        /* THE VISIBILITY FIX: Fixed height prevents Chart.js from collapsing to 0px */
        #chart-wrapper {
            position: relative;
            height: 400px;
            width: 95vw;
            max-width: 900px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .stats-row {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            width: 95vw;
            max-width: 900px;
        }

        .stat-card {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            display: block;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
        }

        .stat-label { font-size: 0.8rem; opacity: 0.7; text-transform: uppercase; }
    </style>
</head>
<body>

    <h1>System Latency Pulse</h1>
    <div class="subtitle">Real-time Performance Monitoring</div>

    <div id="chart-wrapper">
        <canvas id="latencyChart"></canvas>
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <span class="stat-label">Current Latency</span>
            <span id="current-ping" class="stat-value">-- ms</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Server Status</span>
            <span id="server-status" class="stat-value" style="color: #8b949e;">Connecting...</span>
        </div>
    </div>

    <script>
        // 1. UPDATE THIS to your actual Render Web Service URL
        const API_URL = "https://your-service-name.onrender.com"; 

        const ctx = document.getElementById('latencyChart').getContext('2d');
        const pingDisplay = document.getElementById('current-ping');
        const statusDisplay = document.getElementById('server-status');

        // 2. INITIALIZE CHART
        const myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Latency',
                    data: [],
                    borderColor: '#00ffcc',
                    backgroundColor: 'rgba(0, 255, 204, 0.1)',
                    borderWidth: 3,
                    tension: 0.4,
                    fill: true,
                    pointRadius: 4,
                    pointBackgroundColor: '#00ffcc'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false, // Essential for fixed-height container
                scales: {
                    y: { 
                        beginAtZero: true, 
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: '#8b949e' } 
                    },
                    x: { 
                        grid: { display: false },
                        ticks: { color: '#8b949e' } 
                    }
                },
                plugins: {
                    legend: { display: false }
                }
            }
        });

        // 3. FETCH AND SYNC DATA
        async function fetchData() {
            try {
                const res = await fetch(`${API_URL}/stats`);
                if (!res.ok) throw new Error("Offline");
                
                const data = await res.json();

                if (data.length > 0) {
                    const latest = data[data.length - 1];
                    
                    // Update Text Stats
                    pingDisplay.innerText = `${latest.ping_ms} ms`;
                    statusDisplay.innerText = "Online";
                    statusDisplay.style.color = "#238636";

                    // Update Chart Data
                    myChart.data.labels = data.map(d => {
                        const time = new Date(d.created_at);
                        return time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                    });
                    myChart.data.datasets[0].data = data.map(d => d.ping_ms);
                    
                    myChart.update('none'); // Update without flickering
                }
            } catch (err) {
                console.error("Fetch failed:", err);
                statusDisplay.innerText = "Offline";
                statusDisplay.style.color = "#da3633";
            }
        }

        // Auto-refresh every 5 seconds
        setInterval(fetchData, 5000);
        fetchData();
    </script>
</body>
</html>
