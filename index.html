<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINYL PULSE 💿</title>
    <style>
        :root { --neon-green: #00ffcc; --dark-bg: #121212; --card-bg: #1e1e1e; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--dark-bg); 
            color: white; 
            text-align: center; 
            padding: 2rem; 
            margin: 0;
        }
        h1 { font-size: 2.5rem; letter-spacing: 2px; margin-bottom: 0.5rem; }
        .subtitle { color: #888; margin-bottom: 2rem; }
        
        .box { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            display: inline-block; 
            min-width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        
        .status { margin: 12px 0; font-weight: 600; font-size: 1.1rem; }
        .green { color: var(--neon-green); }
        .red { color: #ff4444; }
        
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        
        button {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: var(--neon-green); color: black; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-secondary { border-color: #888; color: #888; }
        .btn-secondary:hover { background: #888; color: black; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { border-bottom: 2px solid #333; padding: 12px; color: var(--neon-green); text-transform: uppercase; font-size: 0.8rem; }
        td { padding: 12px; border-bottom: 1px solid #2a2a2a; font-size: 0.9rem; }
        .timestamp { color: #666; }
    </style>
</head>
<body>

    <h1>VINYL PULSE 💿</h1>
    <p class="subtitle">Real-time RPM & Latency Tracking</p>

    <div class="box">
        <div id="server-status" class="status">Checking Server...</div>
        <div id="db-status" class="status" style="font-size: 0.9rem; opacity: 0.8;">Connecting to DB...</div>
        
        <div class="btn-group">
            <button id="spin-btn" onclick="sendTestSpin()">Log Test Spin 🚀</button>
            <button class="btn-secondary" onclick="downloadCSV()">Export CSV 📊</button>
        </div>
    </div>

    <br>

    <div class="box" style="width: 90%; max-width: 600px;">
        <h3 style="margin-top: 0;">Recent Activity</h3>
        <table>
            <thead>
                <tr>
                    <th style="text-align: left;">Time</th>
                    <th style="text-align: center;">RPM</th>
                    <th style="text-align: right;">Latency</th>
                </tr>
            </thead>
            <tbody id="history-body">
                <tr><td colspan="3" style="color: #444; padding: 20px;">Loading history...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const RENDER_URL = "https://latency-8zo5.onrender.com";

        async function updateDashboard() {
            const statusEl = document.getElementById('server-status');
            const dbStatusEl = document.getElementById('db-status');
            const historyBody = document.getElementById('history-body');

            try {
                const response = await fetch(`${RENDER_URL}/data`);
                if (!response.ok) throw new Error("Offline");

                const data = await response.json();
                
                statusEl.innerText = "Result: Server Online ✅";
                statusEl.className = "status green";
                dbStatusEl.innerText = `Database Connected: ${data.length} records found`;

                historyBody.innerHTML = "";
                if (data.length === 0) {
                    historyBody.innerHTML = '<tr><td colspan="3" style="padding:20px; color:#666;">No data yet. Press "Log Test Spin"!</td></tr>';
                } else {
                    data.forEach(row => {
                        const tr = document.createElement('tr');
                        const time = new Date(row.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                        const rpm = row.data?.rpm || "--";
                        const lat = row.data?.latency || "--";

                        tr.innerHTML = `
                            <td style="text-align: left;" class="timestamp">${time}</td>
                            <td style="text-align: center;">${rpm}</td>
                            <td style="text-align: right;" class="green">${lat}ms</td>
                        `;
                        historyBody.appendChild(tr);
                    });
                }
            } catch (err) {
                statusEl.innerText = "Result: Server Offline ❌";
                statusEl.className = "status red";
                dbStatusEl.innerText = "Verify Render Service is active.";
            }
        }

        async function sendTestSpin() {
            const btn = document.getElementById('spin-btn');
            btn.innerText = "Sending...";
            btn.disabled = true;

            try {
                const fakeData = {
                    rpm: (Math.random() * (33.4 - 33.2) + 33.2).toFixed(2),
                    latency: Math.floor(Math.random() * 50) + 10
                };

                const response = await fetch(`${RENDER_URL}/spin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(fakeData)
                });

                if (response.ok) {
                    await updateDashboard();
                } else {
                    const errorMsg = await response.text();
                    console.error("Server Error:", errorMsg);
                    alert("Server error. Check console/logs.");
                }
            } catch (err) {
                alert("Failed to connect to server.");
            } finally {
                btn.innerText = "Log Test Spin 🚀";
                btn.disabled = false;
            }
        }

        async function downloadCSV() {
            try {
                const response = await fetch(`${RENDER_URL}/data`);
                const data = await response.json();
                
                if (!data || data.length === 0) {
                    alert("No data available to export!");
                    return;
                }

                let csvContent = "data:text/csv;charset=utf-8,ID,Timestamp,RPM,Latency_ms\n";

                data.forEach(row => {
                    const id = row.id;
                    const time = new Date(row.created_at).toISOString();
                    const rpm = row.data?.rpm || "0";
                    const lat = row.data?.latency || "0";
                    csvContent += `${id},${time},${rpm},${lat}\n`;
                });

                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", "vinyl_pulse_data.csv");
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (err) {
                alert("Export failed. See console.");
            }
        }

        window.addEventListener('DOMContentLoaded', updateDashboard);
        setInterval(updateDashboard, 30000);
    </script>
</body>
</html>
</html>
