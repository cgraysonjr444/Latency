<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latency App | cgraysonjr444</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        
        /* THE VISIBILITY FIX: A fixed height prevents the chart from collapsing to 0px */
        #chart-container { 
            position: relative; 
            height: 400px; 
            width: 90%; 
            max-width: 800px; 
            margin: 20px auto; 
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 15px;
        }
        
        #status { font-size: 0.9rem; color: #8b949e; margin-top: 10px; }
        .accent { color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>

    <h1>System <span class="accent">Latency</span> Monitor</h1>
    
    <div id="chart-container">
        <canvas id="latencyChart"></canvas>
    </div>

    <div id="status">Status: Initializing...</div>

    <script>
        // 1. UPDATE THIS with your actual Render Web Service URL
        const API_URL = "https://your-service-name.onrender.com"; 

        const ctx = document.getElementById('latencyChart').getContext('2d');
        const statusEl = document.getElementById('status');

        // 2. INITIALIZE CHART WITH DEMO DATA (So it's never blank)
        const myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Demo 1', 'Demo 2', 'Demo 3'],
                datasets: [{
                    label: 'Latency (ms)',
                    data: [12, 18, 15],
                    borderColor: '#00ffcc',
                    backgroundColor: 'rgba(0, 255, 204, 0.1)',
                    borderWidth: 3,
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, grid: { color: '#333' } },
                    x: { grid: { display: false } }
                }
            }
        });

        // 3. FETCH DATA AND SWAP DEMO DATA FOR REAL DATA
        async function updateDashboard() {
            try {
                const res = await fetch(`${API_URL}/stats`);
                const data = await res.json();

                if (data.length > 0) {
                    // Update Chart with real Database data
                    myChart.data.labels = data.map(d => new Date(d.created_at).toLocaleTimeString());
                    myChart.data.datasets[0].data = data.map(d => d.ping_ms);
                    myChart.data.datasets[0].borderColor = '#00ffcc'; // Switch back to green
                    
                    statusEl.innerHTML = `Status: <span class="accent">Live</span> | Latest: ${data[data.length-1].ping_ms}ms`;
                } else {
                    statusEl.innerText = "Status: Connected (Database Empty - Showing Demo Mode)";
                }
                myChart.update('none');
            } catch (err) {
                statusEl.innerHTML = `Status: <span style="color: #ff4444;">Offline</span> (Check Render URL)`;
                console.error(err);
            }
        }

        // Auto-refresh every 5 seconds
        setInterval(updateDashboard, 5000);
        updateDashboard();
    </script>
</body>
</html>
</html>
