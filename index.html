<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latency Monitor | cgraysonjr444</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent: #00ffcc;
            --text: #c9d1d9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            margin: 40px 0;
            text-align: center;
        }

        h1 { color: var(--accent); margin: 0; font-size: 2rem; }
        p { opacity: 0.8; }

        /* THE CRITICAL CHART FIX: Fixed height prevents collapse */
        #chartWrapper {
            position: relative;
            height: 350px; 
            width: 90%;
            max-width: 800px;
            background: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 800px;
            margin-top: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #30363d;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <h1>System Latency Monitor</h1>
        <p>Live performance tracking for cgraysonjr444.github.io</p>
    </header>

    <div id="chartWrapper">
        <canvas id="latencyChart"></canvas>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-label">Current Ping</span>
            <span id="currentPing" class="stat-value">-- ms</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Status</span>
            <span id="statusIndicator" class="stat-value" style="color: #238636;">Online</span>
        </div>
    </div>

    <script>
        // REPLACE THIS with your actual Render URL
        const API_URL = "https://your-app-name.onrender.com"; 

        const ctx = document.getElementById('latencyChart').getContext('2d');
        
        // Initialize Chart
        const myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Latency (ms)',
                    data: [],
                    borderColor: '#00ffcc',
                    backgroundColor: 'rgba(0, 255, 204, 0.1)',
                    borderWidth: 3,
                    pointRadius: 4,
                    pointBackgroundColor: '#00ffcc',
                    tension: 0.3,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false, // Allows chart to stretch to wrapper height
                scales: {
                    y: { 
                        beginAtZero: true, 
                        grid: { color: 'rgba(255,255,255,0.1)' },
                        ticks: { color: '#8b949e' } 
                    },
                    x: { 
                        grid: { display: false },
                        ticks: { color: '#8b949e', maxRotation: 0 } 
                    }
                },
                plugins: {
                    legend: { display: false }
                }
            }
        });

        // FETCH DATA FROM RENDER
        async function updateDashboard() {
            try {
                const response = await fetch(`${API_URL}/stats`);
                if (!response.ok) throw new Error("Network error");
                
                const data = await response.json();

                if (data.length > 0) {
                    // Update the text display
                    const latest = data[data.length - 1];
                    document.getElementById('currentPing').innerText = `${latest.ping_ms} ms`;

                    // Update the chart
                    myChart.data.labels = data.map(entry => {
                        const date = new Date(entry.created_at);
                        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                    });
                    myChart.data.datasets[0].data = data.map(entry => entry.ping_ms);
                    
                    myChart.update('none'); // Update without flickering
                }
            } catch (err) {
                console.error("Dashboard Sync Failed:", err);
                document.getElementById('statusIndicator').innerText = "Offline";
                document.getElementById('statusIndicator').style.color = "#da3633";
            }
        }

        // Auto-refresh every 5 seconds
        setInterval(updateDashboard, 5000);
        updateDashboard();
    </script>
</body>
</html>
</html>
