<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINYL PULSE 💿</title>
    <style>
        :root { 
            --primary-color: #00ffcc; /* Neon Green */
            --dark-bg: #121212; 
            --card-bg: #1e1e1e; 
        }
        /* Workout Mode Theme */
        body.workout-mode { --primary-color: #ff6600; } /* Electric Orange */

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--dark-bg); 
            color: white; 
            text-align: center; 
            padding: 2rem; 
            margin: 0;
            transition: background 0.5s ease;
        }
        h1 { font-size: 2.5rem; letter-spacing: 2px; margin-bottom: 0.5rem; transition: color 0.3s; }
        .subtitle { color: #888; margin-bottom: 1rem; }
        
        .box { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            display: inline-block; 
            min-width: 380px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            vertical-align: top;
        }

        /* Workout Mode Toggle */
        .mode-toggle {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        /* Camera Feed Styles */
        #camera-container {
            display: none;
            width: 100%;
            max-width: 300px;
            margin: 10px auto;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid var(--primary-color);
        }
        video { width: 100%; transform: scaleX(-1); } /* Mirror effect */
        
        .search-box { margin-bottom: 20px; position: relative; }
        input {
            width: 90%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #111;
            color: white;
            outline: none;
        }
        input:focus { border-color: var(--primary-color); }

        #search-results {
            background: #252525;
            border-radius: 0 0 8px 8px;
            max-height: 150px;
            overflow-y: auto;
            position: absolute;
            width: 94%;
            left: 3%;
            z-index: 10;
        }
        .result-item {
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border-bottom: 1px solid #333;
            text-align: left;
        }
        .result-item:hover { background: #333; }
        .result-item img { width: 30px; height: 30px; border-radius: 4px; }

        .selected-badge {
            background: #2a2a2a;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid var(--primary-color);
        }

        .status { margin: 12px 0; font-weight: 600; font-size: 1.1rem; }
        .primary { color: var(--primary-color); }
        .red { color: #ff4444; }
        
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        
        button {
            background: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: var(--primary-color); color: black; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-secondary { border-color: #888; color: #888; }
        .btn-secondary:hover { background: #888; color: black; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { border-bottom: 2px solid #333; padding: 12px; color: var(--primary-color); text-transform: uppercase; font-size: 0.75rem; }
        td { padding: 12px; border-bottom: 1px solid #2a2a2a; font-size: 0.85rem; vertical-align: middle; }
        .album-art { width: 45px; height: 45px; border-radius: 4px; background: #333; object-fit: cover; }
        .progress-img { width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--primary-color); object-fit: cover; }
    </style>
</head>
<body>

    <h1 id="main-title">VINYL PULSE 💿</h1>
    <p class="subtitle">Audio & Fitness Performance Pipeline</p>

    <div class="mode-toggle">
        <span>Standard Mode</span>
        <button id="toggle-btn" onclick="toggleWorkoutMode()" style="border-radius: 20px; padding: 5px 15px;">Switch to Workout Hub 🔥</button>
    </div>

    <div class="box">
        <div id="camera-container">
            <video id="video" autoplay playsinline></video>
            <div style="font-size: 0.7rem; padding: 5px; background: #000;">LIVE WORKOUT FEED</div>
        </div>

        <div class="search-box">
            <input type="text" id="album-input" placeholder="Search Album..." autocomplete="off">
            <div id="search-results"></div>
        </div>

        <div id="selected-display" style="display: none;" class="selected-badge">
            <img id="sel-img" src="" class="album-art">
            <div style="text-align: left;">
                <div id="sel-title" style="font-weight: bold; font-size: 0.9rem;"></div>
                <div style="font-size: 0.7rem; color: #888;">Selected Album</div>
            </div>
        </div>

        <div id="server-status" class="status">Checking Server...</div>
        
        <div class="btn-group">
            <button id="spin-btn" onclick="sendTestSpin()">Log Performance 🚀</button>
            <button class="btn-secondary" onclick="downloadCSV()">Export CSV 📊</button>
        </div>
    </div>

    <div class="box" style="width: 95%; max-width: 900px; display: block; margin: 20px auto;">
        <h3 style="margin-top: 0;">Performance Log</h3>
        <table>
            <thead>
                <tr>
                    <th style="text-align: left;">Entry</th>
                    <th style="text-align: center;">RPM</th>
                    <th style="text-align: center;">Latency</th>
                    <th style="text-align: right;">Time</th>
                </tr>
            </thead>
            <tbody id="history-body"></tbody>
        </table>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const RENDER_URL = "https://latency-8zo5.onrender.com";
        const DEFAULT_IMG = "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=100&h=100&fit=crop&auto=format";
        let selectedAlbum = null;
        let isWorkoutMode = false;
        let stream = null;

        // --- WORKOUT MODE & CAMERA ---
        async function toggleWorkoutMode() {
            isWorkoutMode = !isWorkoutMode;
            document.body.classList.toggle('workout-mode');
            const videoContainer = document.getElementById('camera-container');
            const btn = document.getElementById('toggle-btn');
            const title = document.getElementById('main-title');

            if (isWorkoutMode) {
                btn.innerText = "Back to Standard Mode 💿";
                title.innerText = "WORKOUT HUB ⚡";
                videoContainer.style.display = "block";
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    document.getElementById('video').srcObject = stream;
                } catch (err) { console.error("Camera access denied"); }
            } else {
                btn.innerText = "Switch to Workout Hub 🔥";
                title.innerText = "VINYL PULSE 💿";
                videoContainer.style.display = "none";
                if (stream) stream.getTracks().forEach(t => t.stop());
            }
        }

        function captureSnapshot() {
            if (!isWorkoutMode) return null;
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = 100;
            canvas.height = 100;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, 100, 100);
            return canvas.toDataURL('image/jpeg', 0.5); // Returns small Base64 string
        }

        // --- DISCOGS SEARCH ---
        const albumInput = document.getElementById('album-input');
        albumInput.addEventListener('input', async (e) => {
            const q = e.target.value;
            if (q.length < 3) return;
            const res = await fetch(`${RENDER_URL}/search-album?q=${encodeURIComponent(q)}`);
            const items = await res.json();
            document.getElementById('search-results').innerHTML = items.map(item => `
                <div class="result-item" onclick="selectAlbum('${item.title.replace(/'/g, "\\'")}', '${item.thumb || DEFAULT_IMG}')">
                    <img src="${item.thumb || DEFAULT_IMG}">
                    <span>${item.title}</span>
                </div>
            `).join('');
        });

        function selectAlbum(title, thumb) {
            selectedAlbum = { title, thumb };
            document.getElementById('selected-display').style.display = "flex";
            document.getElementById('sel-img').src = thumb;
            document.getElementById('sel-title').innerText = title;
            document.getElementById('search-results').innerHTML = "";
            albumInput.value = "";
        }

        async function updateDashboard() {
            try {
                const response = await fetch(`${RENDER_URL}/data`);
                const data = await response.json();
                document.getElementById('server-status').innerText = "Result: Server Online ✅";
                document.getElementById('server-status').className = "status primary";

                const historyBody = document.getElementById('history-body');
                historyBody.innerHTML = "";
                data.forEach(row => {
                    const tr = document.createElement('tr');
                    const time = new Date(row.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    const isWorkout = row.data?.mode === 'workout';
                    
                    tr.innerHTML = `
                        <td style="display: flex; align-items: center; gap: 12px; border: none;">
                            ${row.data?.photo ? `<img src="${row.data.photo}" class="progress-img">` : `<img src="${row.data?.album?.thumb || DEFAULT_IMG}" class="album-art">`}
                            <div style="text-align: left;">
                                <div style="font-weight: bold; font-size: 0.9rem;">${row.data?.album?.title || "Session"}</div>
                                <div style="font-size: 0.7rem; color: ${isWorkout ? '#ff6600' : '#00ffcc'};">${isWorkout ? '💪 WORKOUT RECORD' : '🎵 STANDARD SPIN'}</div>
                            </div>
                        </td>
                        <td style="text-align: center;">${row.data?.rpm || "--"}</td>
                        <td style="text-align: center;" class="primary">${row.data?.latency || "--"}ms</td>
                        <td style="text-align: right; color: #555; font-size: 0.75rem;">${time}</td>
                    `;
                    historyBody.appendChild(tr);
                });
            } catch (err) { console.error(err); }
        }

        async function sendTestSpin() {
            const btn = document.getElementById('spin-btn');
            btn.disabled = true;
            const photo = captureSnapshot();

            try {
                const payload = {
                    rpm: (Math.random() * (33.4 - 33.2) + 33.2).toFixed(2),
                    latency: Math.floor(Math.random() * 50) + 10,
                    album: selectedAlbum || { title: isWorkoutMode ? "Workout Session" : "Generic Spin", thumb: DEFAULT_IMG },
                    mode: isWorkoutMode ? 'workout' : 'standard',
                    photo: photo // This saves the small photo directly to Postgres JSONB!
                };

                await fetch(`${RENDER_URL}/spin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (isWorkoutMode) { /* Keep album for workout duration if needed */ } else { selectedAlbum = null; document.getElementById('selected-display').style.display = "none"; }
                updateDashboard();
            } catch (err) { alert("Error saving record."); }
            finally { btn.disabled = false; }
        }

        function downloadCSV() { /* Existing CSV logic */ }
        window.addEventListener('DOMContentLoaded', updateDashboard);
    </script>
</body>
</html>
